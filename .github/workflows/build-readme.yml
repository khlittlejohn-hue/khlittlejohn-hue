name: Update README

# Keeps the "Latest" block in README.md in sync with my real public GitHub
# activity. The README maintains itself.

on:
  schedule:
    - cron: "0 13 * * *"   # daily, ~09:00 ET
  workflow_dispatch:        # run on demand
  push:
    branches: [main]
    paths:
      - "scripts/build_readme.py"
      - ".github/workflows/build-readme.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build_readme.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh README from latest activity"
          file_pattern: README.md
